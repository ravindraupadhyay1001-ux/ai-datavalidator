<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — AI Agent · Data Validation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{ --primary:#2563eb; --line:rgba(15,23,42,.13); }
    body{
      font-family:'Inter','Segoe UI',sans-serif; color:#0f172a; min-height:100vh;
      background:
        radial-gradient(1100px 550px at 108% -8%, rgba(37,99,235,.10), transparent 60%),
        radial-gradient(900px 480px at -8% 105%, rgba(124,58,237,.08), transparent 55%),
        radial-gradient(700px 400px at 50% -15%, rgba(2,132,199,.06), transparent 60%),
        #eef1f6;
      background-attachment:fixed;
    }
    .grad-text{ font-family:'Sora','Inter',sans-serif; background:linear-gradient(90deg,var(--primary),#7c3aed,#0284c7,var(--primary));
      background-size:300% auto; -webkit-background-clip:text; background-clip:text; color:transparent;
      animation:gradShift 7s ease infinite; }
    @keyframes gradShift{ 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes glowPulse{ 0%,100%{ box-shadow:0 3px 14px -2px rgba(37,99,235,.55), 0 0 0 3px rgba(37,99,235,.1), 0 0 22px -4px rgba(124,58,237,.35); }
      50%{ box-shadow:0 3px 18px -1px rgba(37,99,235,.7), 0 0 0 5px rgba(37,99,235,.14), 0 0 30px -2px rgba(124,58,237,.55); } }
    .logo-mark{ width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,#2563eb,#7c3aed); transform:rotate(45deg); margin:0 auto;
      animation:glowPulse 4.5s ease-in-out infinite; }
    .logo-mark svg{ transform:rotate(-45deg); }
    .card{ background:linear-gradient(180deg,#ffffff,#f6f8fb); border:1.5px solid var(--line);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.7), 0 20px 50px -20px rgba(37,99,235,.25), 0 2px 8px rgba(15,23,42,.06);
      border-radius:20px; }
    .inp{ background:#fff; border:1.5px solid var(--line); border-radius:9px; padding:9px 12px; transition:border-color .15s, box-shadow .15s; }
    .inp:focus{ outline:none; border-color:var(--primary); box-shadow:0 0 0 3.5px rgba(37,99,235,.12); }
    .btn{ position:relative; overflow:hidden; background:linear-gradient(90deg,var(--primary),#4f46e5);
      color:#fff; border-radius:10px; font-weight:600; box-shadow:0 2px 10px -3px rgba(37,99,235,.5);
      transition:filter .15s, transform .12s, box-shadow .2s; }
    .btn::after{ content:''; position:absolute; inset:0; background:linear-gradient(115deg,transparent 20%,rgba(255,255,255,.35) 40%,transparent 60%);
      background-size:250% 100%; background-position:150% 0; transition:background-position .55s ease; }
    .btn:hover::after{ background-position:-50% 0; }
    .btn:hover{ filter:brightness(1.1); box-shadow:0 6px 18px -4px rgba(37,99,235,.65); transform:translateY(-1.5px); }
  </style>
</head>
<body class="flex items-center justify-center">
  <div class="w-full max-w-sm card p-8">
    <div class="text-center mb-6">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2.3 4.5 5.4v5.8c0 5.1 3.3 8.9 7.5 10.2 4.2-1.3 7.5-5.1 7.5-10.2V5.4L12 2.3Z"
                fill="white" fill-opacity=".16" stroke="white" stroke-width="1.3" stroke-linejoin="round"/>
          <path d="M8.6 12.1 11 14.5l4.6-5" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="2.3" r=".9" fill="white"/>
          <circle cx="4.5" cy="5.9" r=".7" fill="white" fill-opacity=".7"/>
          <circle cx="19.5" cy="5.9" r=".7" fill="white" fill-opacity=".7"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold grad-text mt-3">AI Agent</h1>
      <p class="text-sm text-slate-500 mt-1">Sign in to Data Validation</p>
    </div>
    {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-3 py-2 mb-4">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="text-sm text-slate-500">Username</label>
        <input name="username" autofocus required class="inp w-full mt-1 text-sm">
      </div>
      <div>
        <label class="text-sm text-slate-500">Password</label>
        <input name="password" type="password" required class="inp w-full mt-1 text-sm">
      </div>
      <button type="submit" class="btn w-full py-2.5 text-sm">Sign in</button>
    </form>
  </div>
</body>
</html>
